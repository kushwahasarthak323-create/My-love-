<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Forever ❤️</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #1a052e, #4a0e4e, #1a052e);
            color: white;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .screen {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            transition: opacity 0.8s ease, transform 0.8s ease;
        }
        .hidden {
            opacity: 0;
            pointer-events: none;
            display: none !important;
        }
        /* Buttons */
        .btn {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
            border: none;
            padding: 15px 35px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255, 65, 108, 0.5);
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }
        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 65, 108, 0.8);
        }
        /* Floating Hearts */
        .heart {
            position: absolute;
            color: rgba(255, 65, 108, 0.7);
            font-size: 20px;
            animation: float Up 4s linear infinite;
            bottom: -10px;
            z-index: 0;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5) rotate(360deg); opacity: 0; }
        }
        /* Photo Styling */
        .photo-container {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #ff416c;
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(255, 65, 108, 0.5);
            animation: slowZoom 10s infinite alternate;
        }
        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        @keyframes slowZoom {
            0% { transform: scale(1); }
            100% { transform: scale(1.15); }
        }
        /* Proposal Buttons */
        .btn-group {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            position: relative;
            width: 100%;
            justify-content: center;
        }
        #noBtn {
            background: linear-gradient(45deg, #555, #777);
            box-shadow: 0 0 10px rgba(0,0,0,0.3);
        }
        /* Success Letter */
        .letter {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        /* Music Control */
        .music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 50%;
            cursor: pointer;
            z-index: 100;
        }
    </style>
</head>
